<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GridFal 2.0</title>

  <link rel="stylesheet" href="css/style.css">
</head>

<body>

  <!-- TOPBAR -->
  <header class="topbar">
    <h1 class="logo">GridFal</h1>

    <div class="actions">

      <button id="addRowBtn">+ Row</button>
      <button id="addColumnBtn">+ Column</button>

      <button onclick="deleteRow()">Hapus Row</button>
      <button onclick="deleteColumn()">Hapus Column</button>

      <button onclick="undoAction()">Undo</button>

      <button id="exportPdfBtn">Export PDF</button>
      <button onclick="exportExcel()">Export Excel</button>

      <button id="autoNumberBtn">Auto Number</button>

      <button onclick="toggleTheme()">🌙 / ☀️</button>

    </div>
  </header>

  <!-- WORKSPACE -->
  <main class="workspace">

    <div class="table-container">

      <table id="gridTable">
        <tbody>
          <tr>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
          </tr>

          <tr>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
            <td contenteditable="true"></td>
          </tr>
        </tbody>
      </table>

    </div>

  </main>

  <!-- ZOOM -->
  <div class="zoom-control">
    <button id="zoomOutBtn">-</button>
    <span id="zoomLevel">100%</span>
    <button id="zoomInBtn">+</button>
  </div>

  <!-- ONLY 1 SCRIPT -->
  <script src="script.js"></script>

</body>
</html>
